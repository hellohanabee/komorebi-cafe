<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cafe Komorebi — Staff</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap">
<style>
  :root{
    --bg:#FFFFFF; --surface:#F6F5F1; --text:#1F2421;
    --accent:#D9A441; --btnBg:#1F3527; --btnText:#FFFFFF;
    --danger:#C9694E; --success:#3F7A4C; --border:rgba(0,0,0,.12);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);}
  h1,h2{font-family:'Poppins',sans-serif;margin:0;}
  button{cursor:pointer;font-family:inherit;border:none;}
  input,textarea{font-family:inherit;}
  .hidden{display:none !important;}

  #staffLoginScreen{display:flex;justify-content:center;align-items:center;min-height:100vh;background:var(--btnBg);color:#fff;padding:20px;}
  #googleSignInBtn{background:var(--accent);color:var(--text);border-radius:999px;padding:14px 28px;font-size:15px;font-weight:700;}

  #appScreen{min-height:100vh;padding-bottom:40px;}
  #appHeader{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
    padding:16px 18px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
  .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;opacity:.65;}
  #tabBar{display:flex;gap:4px;overflow-x:auto;background:rgba(0,0,0,.05);border-radius:999px;padding:4px;}
  .tabBtn{background:transparent;color:var(--text);opacity:.6;border-radius:999px;padding:8px 14px;font-size:13px;white-space:nowrap;}
  .tabBtn.active{background:var(--accent);color:var(--text);opacity:1;font-weight:700;}
  .soundToggle{border:1px solid var(--border);background:transparent;color:var(--text);border-radius:999px;padding:9px 16px;font-size:13px;}
  .soundToggle.on{background:var(--accent);border-color:var(--accent);font-weight:700;}
  main.tabPanel{padding:18px;max-width:1100px;margin:0 auto;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;}
  .btn{border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:700;}
  .btnPrimary{background:var(--btnBg);color:var(--btnText);}
  .btnAccent{background:var(--accent);color:var(--text);}
  .btnGhost{background:transparent;border:1px solid var(--border);color:var(--text);}
  .btnDanger{background:transparent;border:1px solid var(--danger);color:var(--danger);}
  .btnSuccess{background:var(--success);color:#fff;}

  #tablesGrid, #staffTablesGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-bottom:18px;}
  .tableCard{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;
    display:flex;flex-direction:column;gap:6px;align-items:center;}
  .tableCard.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset;}
  .tableCard .num{font-family:'Shippori Mincho',serif;font-size:19px;}
  .badge{font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:2px 9px;border-radius:999px;}
  .badge.empty{background:rgba(63,122,76,.15);color:var(--success);}
  .badge.occupied{background:rgba(201,105,78,.15);color:var(--danger);}
  .tableCard button{width:100%;font-size:12px;padding:6px;border-radius:8px;}

  #orderNameInput{width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:10px;
    padding:11px 14px;font-size:14.5px;margin-bottom:14px;background:var(--bg);color:var(--text);}

  #catNav{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;}
  .catBtn{flex-shrink:0;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:999px;padding:7px 14px;font-size:13px;}
  .catBtn.active{background:var(--btnBg);color:var(--btnText);border-color:var(--btnBg);}

  #menuList{display:flex;flex-direction:column;gap:8px;margin-bottom:160px;}
  .menuItem{display:flex;justify-content:space-between;align-items:center;background:var(--surface);
    border:1px solid var(--border);border-radius:14px;padding:12px 14px;gap:12px;}
  .menuItem .name{font-weight:700;font-size:14.5px;}
  .menuItem .desc{font-size:12.5px;opacity:.65;margin:2px 0 4px;}
  .menuItem .price{font-size:13px;font-weight:700;opacity:.8;}
  .qtyControl{display:flex;align-items:center;gap:8px;}
  .qtyBtn{width:30px;height:30px;border-radius:999px;background:var(--btnBg);color:var(--btnText);font-size:16px;}
  .qtyNum{min-width:16px;text-align:center;font-weight:700;}

  #cartBar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);
    padding:12px 18px 16px;display:flex;flex-direction:column;gap:8px;box-shadow:0 -6px 20px rgba(0,0,0,.08);z-index:15;}
  #cartNoteInput{resize:none;border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13.5px;background:var(--bg);color:var(--text);}
  #confirmOrderBtn{padding:14px;border-radius:12px;font-size:15px;}
  #confirmOrderBtn:disabled{opacity:.6;}
  .errText{color:var(--danger);font-size:12.5px;}

  #ordersGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
  .orderCard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;}
  .orderCard.new{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
  .orderCardHeader{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;}
  .orderTable{font-weight:700;}
  .orderTime{opacity:.6;}
  .orderItems{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
  .orderItemLine{display:flex;justify-content:space-between;font-size:13.5px;}
  .orderNote{font-size:12.5px;font-style:italic;color:var(--accent);margin-bottom:10px;}
  .orderFooter{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
  .doneLabel{margin:20px 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;opacity:.55;}
  .doneRow{display:flex;flex-wrap:wrap;gap:8px;}
  .doneChip{background:rgba(0,0,0,.05);border-radius:999px;padding:6px 14px;font-size:12.5px;}

  #historyList{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
  .historyCard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;}
  .historyCardHeader{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;font-size:13px;gap:8px;}
  .historyCardHeader .who{font-weight:700;}
  .historyCardHeader .when{opacity:.55;font-size:12px;white-space:nowrap;}
  .historyItems{list-style:none;margin:0 0 10px;padding:0;display:flex;flex-direction:column;gap:3px;}
  .historyItemLine{display:flex;justify-content:space-between;font-size:13px;opacity:.75;}
  .historyFooter{display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px dashed var(--border);}
  .historyTotal{font-weight:700;font-size:15px;}
  .historyStatusBadge{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:2px 9px;border-radius:999px;}
  .historyStatusBadge.done{background:rgba(63,122,76,.15);color:var(--success);}
  .historyStatusBadge.making{background:rgba(217,164,65,.2);color:#8a6417;}
  .historyStatusBadge.new{background:rgba(201,105,78,.15);color:var(--danger);}

  #addTableBtn{margin-bottom:14px;}

  #menuEditorToolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .menuEditRow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:12px;}
  .menuEditRow.unsaved{border-color:var(--accent);}
  .menuEditRow input{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);
    padding:8px 10px;font-size:13.5px;box-sizing:border-box;min-width:0;}
  .editName{flex:1 1 140px;} .editCat{flex:1 1 100px;} .editPrice{flex:0 1 80px;} .editDesc{flex:1 1 100%;}
  select.editCat{appearance:auto;cursor:pointer;}
  .savedTick{font-size:12px;color:var(--success);}

  .schemeRow{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
  .schemeSwatch{border:2px solid var(--border);border-radius:12px;padding:10px 14px;font-size:13px;font-weight:600;
    display:flex;align-items:center;gap:8px;}
  .swatchDot{width:16px;height:16px;border-radius:999px;display:inline-block;}
  .colorField{display:flex;flex-direction:column;gap:6px;}
  .colorField label{font-size:12.5px;opacity:.7;}
  .colorField input[type=color]{width:100%;height:38px;border:1px solid var(--border);border-radius:8px;padding:0;background:none;}
  #themeGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-bottom:16px;}
</style>
</head>
<body>

<div id="staffLoginScreen">
  <div style="text-align:center">
    <div class="eyebrow">Cafe Komorebi · Staff</div>
    <h1 style="font-size:22px;margin:10px 0 22px;color:#fff;">Sign in to continue</h1>
    <button id="googleSignInBtn">Sign in with Google</button>
    <p id="staffLoginError" style="color:#e79c86;font-size:13px;margin-top:14px;"></p>
  </div>
</div>

<div id="appScreen" class="hidden">
  <header id="appHeader">
    <div>
      <div class="eyebrow">Cafe Komorebi</div>
      <h1 id="tabTitle" style="font-size:20px;margin-top:2px;">Take order</h1>
    </div>
    <div id="tabBar">
      <button class="tabBtn active" data-tab="order">Take order</button>
      <button class="tabBtn" data-tab="orders">Live orders</button>
      <button class="tabBtn" data-tab="history">History</button>
      <button class="tabBtn" data-tab="tables">Tables</button>
      <button class="tabBtn" data-tab="menu">Menu</button>
      <button class="tabBtn" data-tab="theme">Theme</button>
    </div>
    <button id="soundToggleBtn" class="soundToggle">🔕 Alert sound off</button>
  </header>

  <main id="orderTab" class="tabPanel">
    <div id="tablesGrid"></div>
    <input id="orderNameInput" placeholder="Customer name (so you can find this order later)" />
    <nav id="catNav"></nav>
    <div id="menuList"></div>
    <div id="cartBar" class="hidden">
      <textarea id="cartNoteInput" placeholder="Note for the kitchen (optional)" rows="1"></textarea>
      <button id="confirmOrderBtn" class="btn btnPrimary">Confirm order</button>
      <div id="orderErrorMsg" class="errText hidden"></div>
    </div>
  </main>

  <main id="ordersTab" class="tabPanel hidden">
    <div id="ordersGrid"></div>
    <div id="doneLabel" class="doneLabel hidden">Recently completed</div>
    <div id="doneRow" class="doneRow"></div>
  </main>

  <main id="historyTab" class="tabPanel hidden">
    <div id="historyList"></div>
  </main>

  <main id="tablesTab" class="tabPanel hidden">
    <button id="addTableBtn" class="btn btnAccent">+ Add table</button>
    <div id="staffTablesGrid"></div>
  </main>

  <main id="menuTab" class="tabPanel hidden">
    <div id="menuEditorToolbar">
      <span style="font-size:12.5px;opacity:.65;">Edit fields, then tap Save on that item</span>
      <button id="addItemBtn" class="btn btnAccent">+ Add item</button>
    </div>
    <div id="menuEditorList"></div>
  </main>

  <main id="themeTab" class="tabPanel hidden">
    <h2 style="font-size:16px;margin-bottom:10px;">Presets</h2>
    <div class="schemeRow" id="presetRow"></div>
    <h2 style="font-size:16px;margin-bottom:10px;">Custom colours</h2>
    <div id="themeGrid"></div>
    <button id="saveThemeBtn" class="btn btnPrimary">Save colour scheme</button>
    <span id="themeSaveStatus" style="margin-left:10px;font-size:12.5px;opacity:.65;"></span>
  </main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, getDocs,
  onSnapshot, query, orderBy, where, serverTimestamp, limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYP3HkTNhh6OMcPEUXK16Uv9rW968oHrA",
  authDomain: "cafe-e31e2.firebaseapp.com",
  projectId: "cafe-e31e2",
  storageBucket: "cafe-e31e2.firebasestorage.app",
  messagingSenderId: "534694645687",
  appId: "1:534694645687:web:2aad293365c6d6e495a232"
};
const AUTHORIZED_STAFF_EMAILS = ["hello.hanabee@gmail.com","helloatthetree@gmail.com","sabnamrajoria@gmail.com"];

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const $ = (id) => document.getElementById(id);
function currency(n){ return `₹${n}`; }

const THEME_FIELDS = [
  { key: "bg", label: "Background" },
  { key: "surface", label: "Card / surface" },
  { key: "text", label: "Text" },
  { key: "accent", label: "Accent (tabs, highlights)" },
  { key: "btnBg", label: "Button background" },
  { key: "btnText", label: "Button text" },
];
const PRESETS = {
  "Bright Cafe": { bg:"#FFFFFF", surface:"#F6F5F1", text:"#1F2421", accent:"#D9A441", btnBg:"#1F3527", btnText:"#FFFFFF" },
  "Coral Pop":   { bg:"#FFF8F5", surface:"#FFEDE7", text:"#2B2B24", accent:"#C9694E", btnBg:"#C9694E", btnText:"#FFFFFF" },
  "Ocean":       { bg:"#F3F8FB", surface:"#E4F0F6", text:"#12242E", accent:"#2E86AB", btnBg:"#12435E", btnText:"#FFFFFF" },
  "Dark Mode":   { bg:"#14201A", surface:"#1B2A21", text:"#F1EFE4", accent:"#D9A441", btnBg:"#D9A441", btnText:"#1B2A21" },
};
let currentScheme = { ...PRESETS["Bright Cafe"] };

function applyScheme(scheme){
  const root = document.documentElement.style;
  Object.entries(scheme).forEach(([k,v]) => root.setProperty(`--${k}`, v));
}
function renderThemeTab(){
  const presetRow = $("presetRow");
  presetRow.innerHTML = "";
  Object.entries(PRESETS).forEach(([name, scheme]) => {
    const btn = document.createElement("button");
    btn.className = "schemeSwatch";
    btn.innerHTML = `<span class="swatchDot" style="background:${scheme.accent}"></span>${name}`;
    btn.onclick = () => { currentScheme = { ...scheme }; applyScheme(currentScheme); renderThemeTab(); };
    presetRow.appendChild(btn);
  });

  const grid = $("themeGrid");
  grid.innerHTML = "";
  THEME_FIELDS.forEach(({key,label}) => {
    const wrap = document.createElement("div");
    wrap.className = "colorField";
    wrap.innerHTML = `<label>${label}</label><input type="color" data-key="${key}" value="${currentScheme[key]}" />`;
    grid.appendChild(wrap);
  });
  grid.querySelectorAll("input[type=color]").forEach((input) => {
    input.oninput = () => {
      currentScheme[input.dataset.key] = input.value;
      applyScheme(currentScheme);
    };
  });
}
$("saveThemeBtn").addEventListener("click", async () => {
  $("themeSaveStatus").textContent = "Saving…";
  try {
    await setDoc(doc(db,"settings","theme"), currentScheme, { merge: true });
    $("themeSaveStatus").textContent = "Saved ✓ — applied for the whole team";
  } catch(e){
    $("themeSaveStatus").textContent = "Couldn't save: " + e.message;
  }
});
function startTheme(){
  onSnapshot(doc(db,"settings","theme"), (snap) => {
    const data = snap.data();
    if (data){
      currentScheme = { ...currentScheme, ...data };
      applyScheme(currentScheme);
      renderThemeTab();
    }
  });
}

$("googleSignInBtn").addEventListener("click", async () => {
  $("staffLoginError").textContent = "";
  unlockAudio(); // this click is a real user gesture — use it to unlock audio early
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e){ $("staffLoginError").textContent = e.message; }
});
onAuthStateChanged(auth, (user) => {
  if (user && AUTHORIZED_STAFF_EMAILS.includes(user.email)) {
    $("staffLoginScreen").classList.add("hidden");
    $("appScreen").classList.remove("hidden");
    startApp();
  } else {
    if (user) $("staffLoginError").textContent = "This Google account isn't authorized for staff access.";
    $("appScreen").classList.add("hidden");
    $("staffLoginScreen").classList.remove("hidden");
  }
});

const TAB_TITLES = { order:"Take order", orders:"Live orders", history:"Order history", tables:"Tables", menu:"Edit menu", theme:"Theme" };
document.querySelectorAll(".tabBtn").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const tab = btn.dataset.tab;
    $("tabTitle").textContent = TAB_TITLES[tab];
    ["order","orders","history","tables","menu","theme"].forEach((t) => {
      $(t+"Tab").classList.toggle("hidden", t !== tab);
    });
    if (tab === "theme") renderThemeTab();
  });
});

let appStarted = false;
function startApp(){
  if (appStarted) return;
  appStarted = true;
  startSoundToggle();
  startTheme();
  startTakeOrder();
  startLiveOrders();
  startHistory();
  startTables();
  startMenuEditor();
}

let soundOn = true, audioCtx = null;
function unlockAudio(){
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  } catch(e){ /* ignore — will retry lazily when a chime actually plays */ }
}
function playChime(){
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const now = audioCtx.currentTime;
    [880,1320].forEach((freq,i)=>{
      const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
      osc.type="sine"; osc.frequency.value=freq;
      gain.gain.setValueAtTime(0, now+i*0.18);
      gain.gain.linearRampToValueAtTime(0.18, now+i*0.18+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now+i*0.18+0.5);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now+i*0.18); osc.stop(now+i*0.18+0.55);
    });
  } catch(e){ console.error("chime failed", e); }
}
function startSoundToggle(){
  // Sound defaults to ON; reflect that in the button right away.
  $("soundToggleBtn").textContent = "🔔 Alert sound on";
  $("soundToggleBtn").classList.add("on");
  $("soundToggleBtn").addEventListener("click", () => {
    soundOn = !soundOn;
    $("soundToggleBtn").textContent = soundOn ? "🔔 Alert sound on" : "🔕 Alert sound off";
    $("soundToggleBtn").classList.toggle("on", soundOn);
    if (soundOn) playChime();
  });
}

function startTakeOrder(){
  let tables = [];
  let selectedTable = null;
  let menu = [];
  let activeCat = null;
  let cart = {};

  onSnapshot(query(collection(db,"tables"), orderBy("number")), (snap) => {
    tables = [];
    snap.forEach(d => tables.push({ id:d.id, ...d.data() }));
    renderTableGrid();
  });

  function renderTableGrid(){
    const grid = $("tablesGrid");
    grid.innerHTML = "";
    if (tables.length === 0){
      grid.innerHTML = `<div style="opacity:.6;font-size:13.5px;">No tables yet — add some in the Tables tab.</div>`;
      return;
    }
    tables.forEach((t) => {
      const isEmpty = t.status !== "occupied";
      const card = document.createElement("div");
      card.className = "tableCard" + (selectedTable === t.number ? " selected" : "");
      card.innerHTML = `
        <div class="num">Table ${t.number}</div>
        <span class="badge ${isEmpty ? "empty" : "occupied"}">${isEmpty ? "Empty" : "Occupied"}</span>
        <button class="btn btnGhost">${selectedTable === t.number ? "Selected" : "Select"}</button>`;
      card.querySelector("button").onclick = () => { selectedTable = t.number; renderTableGrid(); };
      grid.appendChild(card);
    });
  }

  onSnapshot(query(collection(db,"menu")), (snap) => {
    menu = [];
    snap.forEach(d => menu.push({ id:d.id, ...d.data() }));
    if (!activeCat){
      const cats = [...new Set(menu.filter(m=>m.avail!==false).map(m=>m.cat))];
      activeCat = cats[0] || null;
    }
    renderCatNav(); renderMenuList();
  });

  function renderCatNav(){
    const cats = [...new Set(menu.filter(m=>m.avail!==false).map(m=>m.cat))];
    $("catNav").innerHTML = "";
    cats.forEach((c) => {
      const b = document.createElement("button");
      b.className = "catBtn" + (c===activeCat ? " active":"");
      b.textContent = c;
      b.onclick = () => { activeCat = c; renderCatNav(); renderMenuList(); };
      $("catNav").appendChild(b);
    });
  }

  function renderMenuList(){
    const list = $("menuList");
    list.innerHTML = "";
    menu.filter(m=>m.cat===activeCat && m.avail!==false).forEach((m) => {
      const qty = cart[m.id] || 0;
      const row = document.createElement("div");
      row.className = "menuItem";
      row.innerHTML = `
        <div>
          <div class="name">${m.name}</div>
          <div class="desc">${m.desc||""}</div>
          <div class="price">${currency(m.price)}</div>
        </div>
        <div class="qtyControl">
          ${qty>0 ? `<button class="qtyBtn" data-a="minus" data-id="${m.id}">−</button><span class="qtyNum">${qty}</span>` : ""}
          <button class="qtyBtn" data-a="plus" data-id="${m.id}">+</button>
        </div>`;
      list.appendChild(row);
    });
    list.querySelectorAll("button[data-a]").forEach((btn) => {
      btn.onclick = () => {
        const id = btn.dataset.id;
        const delta = btn.dataset.a === "plus" ? 1 : -1;
        cart[id] = Math.max(0, (cart[id]||0)+delta);
        renderMenuList(); renderCartBar();
      };
    });
  }

  function cartItems(){ return Object.entries(cart).filter(([,q])=>q>0); }
  function cartTotal(){
    return cartItems().reduce((sum,[id,q]) => {
      const m = menu.find(x=>x.id===id);
      return sum + (m ? m.price*q : 0);
    }, 0);
  }
  function renderCartBar(){
    const items = cartItems();
    const bar = $("cartBar");
    if (items.length===0){ bar.classList.add("hidden"); return; }
    bar.classList.remove("hidden");
    const count = items.reduce((s,[,q])=>s+q,0);
    $("confirmOrderBtn").textContent = `Confirm order · ${count} item${count>1?"s":""} · ${currency(cartTotal())}`;
  }

  $("confirmOrderBtn").addEventListener("click", async () => {
    const items = cartItems();
    $("orderErrorMsg").classList.add("hidden");
    if (!selectedTable){
      $("orderErrorMsg").textContent = "Select a table first.";
      $("orderErrorMsg").classList.remove("hidden");
      return;
    }
    if (items.length===0) return;
    $("confirmOrderBtn").disabled = true;
    $("confirmOrderBtn").textContent = "Saving…";
    const name = $("orderNameInput").value.trim() || "Guest";
    const note = $("cartNoteInput").value.trim();
    const newItems = items.map(([id,qty]) => {
      const m = menu.find(x=>x.id===id);
      return { id, name: m.name, price: m.price, qty, served: false };
    });
    try {
      const snap = await getDocs(query(collection(db,"orders"), where("table","==",selectedTable)));
      let existing = null;
      snap.forEach(d => {
        const data = d.data();
        if (data.status !== "done") existing = { id:d.id, ...data };
      });

      if (existing){
        const mergedItems = [...existing.items];
        newItems.forEach((ni) => {
          const found = mergedItems.find(x=>x.id===ni.id);
          // Adding more of an already-served item means some units are
          // freshly ordered, so it goes back to pending until re-served.
          if (found){ found.qty += ni.qty; found.served = false; }
          else mergedItems.push(ni);
        });
        const mergedTotal = mergedItems.reduce((s,it)=>s+it.price*it.qty,0);
        const mergedNote = [existing.note, note].filter(Boolean).join(" | ");
        await updateDoc(doc(db,"orders",existing.id), {
          items: mergedItems, total: mergedTotal, note: mergedNote,
          customerName: name || existing.customerName, updatedAt: serverTimestamp()
        });
      } else {
        await addDoc(collection(db,"orders"), {
          table: selectedTable, customerName: name, items: newItems, note,
          total: cartTotal(), status: "new", createdAt: serverTimestamp()
        });
        const tableDoc = tables.find(t=>t.number===selectedTable);
        if (tableDoc) await updateDoc(doc(db,"tables",tableDoc.id), { status:"occupied" });
      }

      cart = {}; $("cartNoteInput").value = ""; $("orderNameInput").value = "";
      renderMenuList(); renderCartBar();
    } catch(e){
      $("orderErrorMsg").textContent = "Couldn't send: " + e.message;
      $("orderErrorMsg").classList.remove("hidden");
    }
    $("confirmOrderBtn").disabled = false;
  });
}

function startLiveOrders(){
  let knownSignatures = new Map(); // orderId -> "itemCount|total" snapshot
  let firstLoad = true;

  function signatureOf(o){
    const itemCount = (o.items||[]).reduce((s,it)=>s+it.qty,0);
    return `${itemCount}|${o.total}`; // deliberately excludes status, so
    // tapping "Start making"/"Mark done" doesn't itself trigger a chime —
    // only a genuinely new or added-to order should.
  }

  onSnapshot(query(collection(db,"orders"), orderBy("createdAt","desc"), limit(80)), (snap) => {
    const orders = [];
    snap.forEach(d => orders.push({ id:d.id, ...d.data() }));

    if (!firstLoad){
      let shouldChime = false;
      orders.forEach((o) => {
        const sig = signatureOf(o);
        const prevSig = knownSignatures.get(o.id);
        // New order, or an existing order whose items/total changed
        // (e.g. more items added to the same table) — both should alert.
        if (prevSig === undefined || (prevSig !== sig && o.status !== "done")){
          shouldChime = true;
        }
      });
      if (shouldChime && soundOn) playChime();
    }

    orders.forEach(o => knownSignatures.set(o.id, signatureOf(o)));
    firstLoad = false;
    renderOrders(orders);
  });

  function renderOrders(orders){
    const active = orders.filter(o=>o.status!=="done");
    const done = orders.filter(o=>o.status==="done").slice(0,6);
    const grid = $("ordersGrid");
    grid.innerHTML = "";
    if (active.length===0){
      grid.innerHTML = `<div style="opacity:.6;font-size:14px;">No active orders.</div>`;
    }
    active.forEach((o) => {
      const time = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : "";
      const card = document.createElement("div");
      card.className = "orderCard" + (o.status==="new" ? " new" : "");
      card.innerHTML = `
        <div class="orderCardHeader"><span class="orderTable">Table ${o.table} · ${o.customerName||"Guest"}</span><span class="orderTime">${time}</span></div>
        <ul class="orderItems">${o.items.map((it,idx)=>`
          <li class="orderItemLine" style="${it.served ? "opacity:.55;" : ""}">
            <span style="display:flex;align-items:center;gap:8px;">
              <button class="servedToggleBtn" data-order-id="${o.id}" data-item-idx="${idx}" title="${it.served ? "Mark pending" : "Mark served"}"
                style="width:20px;height:20px;border-radius:6px;font-size:12px;line-height:1;padding:0;
                  background:${it.served ? "var(--success)" : "transparent"};
                  border:1px solid ${it.served ? "var(--success)" : "var(--border)"};
                  color:${it.served ? "#fff" : "var(--text)"};">${it.served ? "✓" : ""}</button>
              <span style="${it.served ? "text-decoration:line-through;" : ""}">${it.name}</span>
            </span>
            <span style="display:flex;align-items:center;gap:6px;">
              <button class="orderQtyBtn" data-order-id="${o.id}" data-item-idx="${idx}" data-delta="-1" title="Remove one"
                style="background:transparent;border:1px solid var(--danger);color:var(--danger);border-radius:6px;width:20px;height:20px;font-size:13px;line-height:1;padding:0;">−</button>
              <span style="min-width:14px;text-align:center;">${it.qty}</span>
              <button class="orderQtyBtn" data-order-id="${o.id}" data-item-idx="${idx}" data-delta="1" title="Add one"
                style="background:transparent;border:1px solid var(--border);color:var(--text);border-radius:6px;width:20px;height:20px;font-size:13px;line-height:1;padding:0;">+</button>
              <span style="opacity:.6;min-width:52px;text-align:right;">${currency(it.price*it.qty)}</span>
            </span>
          </li>`).join("")}</ul>
        ${o.note ? `<div class="orderNote">Note: ${o.note}</div>` : ""}
        <div class="orderFooter">
          <span style="font-weight:700">${currency(o.total)}</span>
          ${o.status==="new" ? `<button class="btn btnAccent" data-id="${o.id}" data-next="making">Start making</button>` : ""}
          ${o.status==="making" ? `<button class="btn btnSuccess" data-id="${o.id}" data-next="done">Mark done</button>` : ""}
        </div>`;
      grid.appendChild(card);
    });
    grid.querySelectorAll(".servedToggleBtn").forEach((btn) => {
      btn.onclick = async () => {
        const order = active.find(o=>o.id===btn.dataset.orderId);
        if (!order) return;
        const idx = Number(btn.dataset.itemIdx);
        const updatedItems = order.items.map((it,i) => i===idx ? { ...it, served: !it.served } : it);
        try { await updateDoc(doc(db,"orders",order.id), { items: updatedItems }); }
        catch(e){ console.error(e); }
      };
    });
    grid.querySelectorAll(".orderQtyBtn").forEach((btn) => {
      btn.onclick = async () => {
        const order = active.find(o=>o.id===btn.dataset.orderId);
        if (!order) return;
        const idx = Number(btn.dataset.itemIdx);
        const delta = Number(btn.dataset.delta);
        const item = order.items[idx];
        if (!item) return;
        const newQty = item.qty + delta;

        if (newQty <= 0){
          if (!confirm(`Remove ${item.name} from Table ${order.table}'s order?`)) return;
        }

        const updatedItems = order.items
          .map((it,i) => i===idx ? { ...it, qty: newQty, served: delta > 0 ? false : it.served } : it)
          .filter((it) => it.qty > 0);

        try {
          if (updatedItems.length === 0){
            // No items left — the order is effectively cancelled.
            await deleteDoc(doc(db,"orders",order.id));
            const stillActive = orders.some(o=>o.table===order.table && o.id!==order.id && o.status!=="done");
            if (!stillActive){
              const tblSnap = await getDocs(query(collection(db,"tables"), where("number","==",order.table)));
              tblSnap.forEach(async (t) => await updateDoc(doc(db,"tables",t.id), { status:"empty" }));
            }
          } else {
            const newTotal = updatedItems.reduce((s,it)=>s+it.price*it.qty,0);
            await updateDoc(doc(db,"orders",order.id), { items: updatedItems, total: newTotal });
          }
        } catch(e){ console.error(e); alert("Couldn't update item: " + e.message); }
      };
    });
    grid.querySelectorAll("button[data-next]").forEach((btn) => {
      btn.onclick = async () => {
        try {
          await updateDoc(doc(db,"orders",btn.dataset.id), { status: btn.dataset.next });
          if (btn.dataset.next === "done"){
            const order = orders.find(o=>o.id===btn.dataset.id);
            if (order){
              const stillActive = orders.some(o=>o.table===order.table && o.id!==order.id && o.status!=="done");
              if (!stillActive){
                const tblSnap = await getDocs(query(collection(db,"tables"), where("number","==",order.table)));
                tblSnap.forEach(async (t) => await updateDoc(doc(db,"tables",t.id), { status:"empty" }));
              }
            }
          }
        } catch(e){ console.error(e); }
      };
    });
    $("doneLabel").classList.toggle("hidden", done.length===0);
    $("doneRow").innerHTML = done.map(o=>`<div class="doneChip">Table ${o.table} · ${o.customerName||"Guest"} · ${currency(o.total)}</div>`).join("");
  }
}

function startHistory(){
  onSnapshot(query(collection(db,"orders"), orderBy("createdAt","desc"), limit(200)), (snap) => {
    const orders = [];
    snap.forEach(d => orders.push({ id:d.id, ...d.data() }));
    const list = $("historyList");
    list.innerHTML = "";
    if (orders.length===0){
      list.innerHTML = `<div style="opacity:.6;font-size:14px;">No orders yet.</div>`;
      return;
    }
    orders.forEach((o) => {
      const time = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString([], {day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}) : "";
      const card = document.createElement("div");
      card.className = "historyCard";
      const statusLabel = o.status === "done" ? "Completed" : o.status === "making" ? "Making" : "New";
      const statusClass = o.status === "done" ? "done" : o.status === "making" ? "making" : "new";
      card.innerHTML = `
        <div class="historyCardHeader">
          <span class="who">Table ${o.table} · ${o.customerName||"Guest"}</span>
          <span class="when">${time}</span>
        </div>
        <ul class="historyItems">${o.items.map(it=>`<li class="historyItemLine"><span>${it.qty}× ${it.name}</span><span>${currency(it.price*it.qty)}</span></li>`).join("")}</ul>
        <div class="historyFooter">
          <span class="historyTotal">${currency(o.total)}</span>
          <span class="historyStatusBadge ${statusClass}">${statusLabel}</span>
        </div>`;
      list.appendChild(card);
    });
  });
}

function startTables(){
  onSnapshot(query(collection(db,"tables"), orderBy("number")), (snap) => {
    const tables = [];
    snap.forEach(d => tables.push({ id:d.id, ...d.data() }));
    renderStaffTables(tables);
  });
  function renderStaffTables(tables){
    const grid = $("staffTablesGrid");
    grid.innerHTML = "";
    if (tables.length===0){
      grid.innerHTML = `<div style="opacity:.6;font-size:14px;">No tables yet — add your first one.</div>`;
      return;
    }
    tables.forEach((t) => {
      const isEmpty = t.status !== "occupied";
      const card = document.createElement("div");
      card.className = "tableCard";
      card.innerHTML = `
        <div class="num">Table ${t.number}</div>
        <span class="badge ${isEmpty?"empty":"occupied"}">${isEmpty?"Empty":"Occupied"}</span>
        <button class="btn btnGhost toggleBtn" data-id="${t.id}" data-next="${isEmpty?"occupied":"empty"}">Mark ${isEmpty?"occupied":"empty"}</button>
        <button class="btn btnDanger removeBtn" data-id="${t.id}">Remove</button>`;
      grid.appendChild(card);
    });
    grid.querySelectorAll(".toggleBtn").forEach((btn) => {
      btn.onclick = async () => { try { await updateDoc(doc(db,"tables",btn.dataset.id), { status: btn.dataset.next }); } catch(e){ console.error(e); } };
    });
    grid.querySelectorAll(".removeBtn").forEach((btn) => {
      btn.onclick = async () => { try { await deleteDoc(doc(db,"tables",btn.dataset.id)); } catch(e){ console.error(e); } };
    });
  }
  $("addTableBtn").addEventListener("click", async () => {
    const nums = Array.from(document.querySelectorAll("#staffTablesGrid .num")).map(el=>parseInt(el.textContent.replace("Table ",""),10)).filter(n=>!isNaN(n));
    const nextNum = nums.length ? Math.max(...nums)+1 : 1;
    try { await addDoc(collection(db,"tables"), { number: nextNum, status: "empty" }); }
    catch(e){ console.error(e); }
  });
}

function startMenuEditor(){
  let draftRows = [];
  let syncedMenu = [];

  onSnapshot(query(collection(db,"menu")), (snap) => {
    syncedMenu = [];
    snap.forEach(d => syncedMenu.push({ id:d.id, ...d.data() }));
    renderMenuEditor();
  });

  $("addItemBtn").addEventListener("click", () => {
    draftRows.unshift({ tempId: "draft_"+Date.now(), name:"", cat:"Coffee", price:100, desc:"" });
    renderMenuEditor();
  });

  const NEW_CAT_VALUE = "__new__";
  function getAllCategories(){
    const cats = new Set();
    syncedMenu.forEach(m => { if (m.cat) cats.add(m.cat); });
    draftRows.forEach(d => { if (d.cat) cats.add(d.cat); });
    return [...cats].sort();
  }
  function categorySelectHtml(selectedCat){
    const cats = getAllCategories();
    if (selectedCat && !cats.includes(selectedCat)) cats.push(selectedCat);
    const options = cats.map(c => `<option value="${c.replace(/"/g,'&quot;')}" ${c===selectedCat?"selected":""}>${c}</option>`).join("");
    return `<select class="editCat">${options}<option value="${NEW_CAT_VALUE}">＋ New category…</option></select>`;
  }
  function wireCategorySelect(selectEl){
    selectEl.addEventListener("change", () => {
      if (selectEl.value === NEW_CAT_VALUE){
        const newCat = prompt("New category name:");
        if (newCat && newCat.trim()){
          const opt = document.createElement("option");
          opt.value = newCat.trim();
          opt.textContent = newCat.trim();
          opt.selected = true;
          selectEl.insertBefore(opt, selectEl.lastElementChild);
        } else {
          selectEl.selectedIndex = 0;
        }
      }
    });
  }

  function renderMenuEditor(){
    const list = $("menuEditorList");
    list.innerHTML = "";

    draftRows.forEach((d) => {
      const row = document.createElement("div");
      row.className = "menuEditRow unsaved";
      row.innerHTML = `
        <input class="editName" placeholder="Item name" value="${d.name}" />
        ${categorySelectHtml(d.cat)}
        <input class="editPrice" type="number" value="${d.price}" />
        <input class="editDesc" placeholder="Description" value="${d.desc}" />
        <button class="btn btnPrimary saveBtn">Save</button>
        <button class="btn btnDanger discardBtn">Discard</button>`;
      const nameI = row.querySelector(".editName");
      const catI = row.querySelector(".editCat");
      const priceI = row.querySelector(".editPrice");
      const descI = row.querySelector(".editDesc");
      wireCategorySelect(catI);
      row.querySelector(".saveBtn").onclick = async () => {
        const name = nameI.value.trim();
        if (!name){ nameI.focus(); return; }
        try {
          await addDoc(collection(db,"menu"), { name, cat: catI.value.trim()||"Coffee", price: Number(priceI.value)||0, desc: descI.value.trim(), avail:true });
          draftRows = draftRows.filter(x=>x.tempId!==d.tempId);
          renderMenuEditor();
        } catch(e){ alert("Couldn't save: " + e.message); }
      };
      row.querySelector(".discardBtn").onclick = () => {
        draftRows = draftRows.filter(x=>x.tempId!==d.tempId);
        renderMenuEditor();
      };
      list.appendChild(row);
    });

    syncedMenu.forEach((m) => {
      const row = document.createElement("div");
      row.className = "menuEditRow";
      row.style.opacity = m.avail===false ? "0.5" : "1";
      row.innerHTML = `
        <input class="editName" value="${(m.name||"").replace(/"/g,'&quot;')}" />
        ${categorySelectHtml(m.cat)}
        <input class="editPrice" type="number" value="${m.price||0}" />
        <input class="editDesc" value="${(m.desc||"").replace(/"/g,'&quot;')}" placeholder="Description" />
        <button class="btn btnPrimary saveBtn">Save</button>
        <span class="savedTick hidden">Saved ✓</span>
        <button class="btn btnGhost toggleAvailBtn">${m.avail===false?"Show":"Hide"}</button>
        <button class="btn btnDanger removeBtn">Remove</button>`;
      const nameI = row.querySelector(".editName");
      const catI = row.querySelector(".editCat");
      const priceI = row.querySelector(".editPrice");
      const descI = row.querySelector(".editDesc");
      wireCategorySelect(catI);
      row.querySelector(".saveBtn").onclick = async () => {
        try {
          await setDoc(doc(db,"menu",m.id), {
            name: nameI.value.trim(), cat: catI.value.trim(),
            price: Number(priceI.value)||0, desc: descI.value.trim()
          }, { merge:true });
          const tick = row.querySelector(".savedTick");
          tick.classList.remove("hidden");
          setTimeout(()=>tick.classList.add("hidden"), 1500);
        } catch(e){ alert("Couldn't save: " + e.message); }
      };
      row.querySelector(".toggleAvailBtn").onclick = async () => {
        try { await updateDoc(doc(db,"menu",m.id), { avail: m.avail===false ? true : false }); }
        catch(e){ console.error(e); }
      };
      row.querySelector(".removeBtn").onclick = async () => {
        try { await deleteDoc(doc(db,"menu",m.id)); }
        catch(e){ console.error(e); }
      };
      list.appendChild(row);
    });
  }
}
</script>
